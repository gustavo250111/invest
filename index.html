<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invest Analyzer</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0d1117;
    color:#fff;
    min-height:100vh;
}

header{
    background:#161b22;
    padding:30px;
    text-align:center;
    border-bottom:1px solid #30363d;
}

header h1{
    color:#58a6ff;
    margin-bottom:10px;
}

.search{
    max-width:700px;
    margin:40px auto;
    display:flex;
    gap:10px;
    padding:0 20px;
}

.search input{
    flex:1;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#21262d;
    color:white;
    font-size:16px;
}

.search button{
    padding:15px 25px;
    border:none;
    border-radius:12px;
    background:#238636;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.card{
    max-width:900px;
    margin:20px auto;
    background:#161b22;
    padding:30px;
    border-radius:20px;
    box-shadow:0 0 15px rgba(0,0,0,.35);
}

.nota{
    font-size:50px;
    font-weight:bold;
    color:#58a6ff;
    margin:15px 0;
}

.barra{
    width:100%;
    height:20px;
    background:#21262d;
    border-radius:999px;
    overflow:hidden;
    margin-bottom:20px;
}

.progresso{
    height:100%;
    background:#238636;
}

.info{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:15px;
    margin-top:20px;
}

.box{
    background:#21262d;
    padding:15px;
    border-radius:12px;
}

.good{
    color:#3fb950;
    margin-top:20px;
}

.bad{
    color:#f85149;
    margin-top:20px;
}

ul{
    margin-left:20px;
    margin-top:10px;
}

footer{
    text-align:center;
    padding:40px;
    color:#8b949e;
}
</style>

</head>

<body>

<header>
    <h1>📈 INVEST ANALYZER</h1>
    <p>Análise Fundamentalista de Ações</p>
</header>

<div class="search">
    <input id="ticker" placeholder="Digite PETR4, VALE3 ou BBAS3">
    <button onclick="analisar()">Analisar</button>
</div>

<div id="resultado"></div>

<footer>
    Invest Analyzer © 2026
</footer>

<script>

const acoes = {

    PETR4:{
        nome:"Petrobras PN",
        pl:6.2,
        pvp:1.2,
        dy:12.5,
        roe:23,
        preco:34.50,
        justo:42.10
    },

    VALE3:{
        nome:"Vale ON",
        pl:7.8,
        pvp:1.6,
        dy:9.4,
        roe:18,
        preco:58.90,
        justo:68.30
    },

    BBAS3:{
        nome:"Banco do Brasil",
        pl:4.3,
        pvp:0.9,
        dy:10.8,
        roe:21,
        preco:27.40,
        justo:35.90
    }

};

function analisar(){

    const ticker = document
        .getElementById("ticker")
        .value
        .toUpperCase()
        .trim();

    const acao = acoes[ticker];

    if(!acao){
        document.getElementById("resultado").innerHTML =
        `
        <div class="card">
            <h2>❌ Ação não encontrada</h2>
            <p>Tente PETR4, VALE3 ou BBAS3.</p>
        </div>
        `;
        return;
    }

    let pontos = 0;

    if(acao.pl < 15) pontos++;
    if(acao.pvp < 1.5) pontos++;
    if(acao.dy > 5) pontos++;
    if(acao.roe > 15) pontos++;

    const nota = ((pontos / 4) * 10).toFixed(1);

    document.getElementById("resultado").innerHTML =
    `
    <div class="card">

        <h2>${acao.nome}</h2>

        <div class="nota">${nota}/10 ⭐</div>

        <div class="barra">
            <div class="progresso" style="width:${nota * 10}%"></div>
        </div>

        <div class="info">

            <div class="box">
                <b>P/L</b><br>${acao.pl}
            </div>

            <div class="box">
                <b>P/VP</b><br>${acao.pvp}
            </div>

            <div class="box">
                <b>Dividend Yield</b><br>${acao.dy}%
            </div>

            <div class="box">
                <b>ROE</b><br>${acao.roe}%
            </div>

            <div class="box">
                <b>Preço Atual</b><br>R$ ${acao.preco}
            </div>

            <div class="box">
                <b>Preço Justo</b><br>R$ ${acao.justo}
            </div>

        </div>

        <h3 class="good">✅ Pontos Positivos</h3>

        <ul>
            ${acao.pl < 15 ? "<li>P/L saudável</li>" : ""}
            ${acao.pvp < 1.5 ? "<li>P/VP atrativo</li>" : ""}
            ${acao.dy > 5 ? "<li>Dividend Yield acima de 5%</li>" : ""}
            ${acao.roe > 15 ? "<li>ROE acima de 15%</li>" : ""}
        </ul>

        <h3 class="bad">❌ Pontos Negativos</h3>

        <ul>
            ${acao.pl >= 15 ? "<li>P/L elevado</li>" : ""}
            ${acao.pvp >= 1.5 ? "<li>P/VP elevado</li>" : ""}
            ${acao.dy <= 5 ? "<li>Dividend Yield baixo</li>" : ""}
            ${acao.roe <= 15 ? "<li>ROE baixo</li>" : ""}
        </ul>

    </div>
    `;
}

</script>

</body>
</html>
]
